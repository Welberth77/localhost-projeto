<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cardapio.css">
    <!-- Fonte roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">    
    <!-- Fonte Fira Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Fonte Dosis -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Localhost - Cardápio</title>
    <link rel="stylesheet" href="header-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header> <!-- Igor - Cabeçalho padrão com logo e menu de navegação -->
        <div class="header-logo-wrap">
            <div class="header-logo-card">
                <a href="index.html" aria-label="Localhost — Início">
                    <img src="img/logo-localhost-cinza.png" alt="Logo LocalHost">
                </a>
            </div>
        </div>

        <nav class="header-nav" aria-label="Categorias do cardápio">
            <a href="produtos.html"          class="nav-tab">Mais Vendidos</a>
            <a href="hamburgueres.html"      class="nav-tab">Hambúrgueres</a>
            <a href="pizzas.html"            class="nav-tab">Pizzas</a>
            <a href="bebidas.html"           class="nav-tab">Bebidas</a>
            <a href="acompanhamentos.html"   class="nav-tab active">Acompanhamentos</a>
        </nav>

        <script>
        // -- Coração favorito
        document.querySelectorAll('.heart-icon').forEach(heart => {
            heart.addEventListener('click', function(e) {
                e.stopPropagation();
                if (this.src.includes('coracao-vazio.png')) {
                    this.src = 'img/coracao-cheio.png';
                    this.alt = 'coracao cheio';
                } else {
                    this.src = 'img/coracao-vazio.png';
                    this.alt = 'coracao vazio';
                }
            });
        });

        // -- Navegar para o detalhe ao clicar no card
        const mapaDetalhes = {
          "cpp-burguer": "detalhe-cpp-burguer.html",
          "phpizza": "detalhe-phpizza.html",
          "soft-cpp": "detalhe-soft-cpp.html",
          "js-fries": "detalhe-js-fries.html",
          "pyburguer": "detalhe-pyburguer.html",
          "fullstack-burguer": "detalhe-fullstack-burguer.html",
          "bacon": "detalhe-bacon.html",
          "queijo-fullstack": "detalhe-queijo-fullstack.html",
          "javarita": "detalhe-javarita.html",
          "frango-catupy": "detalhe-frango-catupy.html",
          "suco-git": "detalhe-suco-git.html",
          "java-coffee": "detalhe-java-coffee.html",
          "agua": "detalhe-agua.html",
          "nuggets": "detalhe-nuggets.html",
          "onion": "detalhe-onion.html",
          "rust-ica": "detalhe-rust-ica.html"
};

        document.querySelectorAll('.item-card[data-produto]').forEach(card => {
            card.style.cursor = 'pointer';
            card.addEventListener('click', function() {
                const destino = mapaDetalhes[this.dataset.produto];
                if (destino) window.location.href = destino;
            });
        });
    </script>
</body>
</html>
